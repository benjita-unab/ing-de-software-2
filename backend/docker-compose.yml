# Solo backend en desarrollo (sin frontend ni Mosquitto).
# Para el stack completo usa docker compose en la raíz del repositorio.

services:
  logitrack-backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: logitrack-backend
    env_file:
      - path: .env
        required: false
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
    volumes:
      - ./src:/app/src
      - backend_node_modules:/app/node_modules
    networks:
      - logitrack-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  logitrack-network:
    driver: bridge

volumes:
  backend_node_modules:
