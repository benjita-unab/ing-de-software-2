name: logitrack

networks:
  logitrack-network:
    driver: bridge

volumes:
  mosquitto_data:
  mosquitto_log:

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: logitrack-backend
    env_file:
      - path: ./backend/.env
        required: true
    environment:
      NODE_ENV: production
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    networks:
      - logitrack-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:3000}
        REACT_APP_GOOGLE_MAPS_API_KEY: ${REACT_APP_GOOGLE_MAPS_API_KEY:-}
        REACT_APP_MQTT_BROKER_URL: ${REACT_APP_MQTT_BROKER_URL:-ws://localhost:9001}
        REACT_APP_DEMO_EMAIL: ${REACT_APP_DEMO_EMAIL:-}
        REACT_APP_DEMO_PASSWORD: ${REACT_APP_DEMO_PASSWORD:-}
    container_name: logitrack-frontend
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    networks:
      - logitrack-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.25-alpine
    container_name: logitrack-backend-proxy
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - logitrack-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: logitrack-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - logitrack-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mosquitto_sub -h localhost -t '$$SYS/broker/uptime' -C 1 -i healthcheck -W 3 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
